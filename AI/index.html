<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Students — Red & Blue Modern</title>
  <style>
    :root{
      --bg:#0f1724; /* deep navy */
      --card:#0b1020;
      --accent-red:#ff4d6d;
      --accent-blue:#4da6ff;
      --muted:#9aa4b2;
      --glass: rgba(255,255,255,0.03);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
      background: linear-gradient(120deg,#071025 0%, #07142a 35%, #0a0f1a 100%);
      color:#e6eef8;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
    }
    .container{
      width:100%;
      max-width:1000px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:16px;
      padding:28px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.6);
      border:1px solid rgba(255,255,255,0.03);
      backdrop-filter: blur(6px);
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }
    h1{
      font-size:20px;
      margin:0;
      letter-spacing:0.2px;
    }
    .brand{
      display:flex;align-items:center;gap:12px
    }
    .logo{
      width:44px;height:44px;border-radius:10px;
      background:linear-gradient(135deg,var(--accent-red),var(--accent-blue));
      box-shadow: 0 6px 18px rgba(77,166,255,0.12), inset 0 -6px 18px rgba(255,77,109,0.06);
      display:flex;align-items:center;justify-content:center;font-weight:700;color:#062033
    }
    .controls{display:flex;gap:8px;align-items:center}
    button.btn{
      appearance:none;border:0;padding:8px 12px;border-radius:10px;color:white;font-weight:600;cursor:pointer;
      background:linear-gradient(90deg,var(--accent-red),var(--accent-blue));
      transition:transform .15s ease,box-shadow .15s ease,opacity .15s;
      box-shadow: 0 6px 18px rgba(6,18,40,0.45);
    }
    button.btn.secondary{
      background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);font-weight:600;
    }
    main{
      margin-top:6px;
    }
    .card{
      background:var(--card);
      border-radius:12px;padding:18px;border:1px solid rgba(255,255,255,0.02);
    }
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;border-spacing:0;font-size:14px}
    thead th{font-weight:700;text-align:left;padding:12px 8px;color:var(--muted);font-size:13px}
    tbody td{padding:12px 8px;border-top:1px solid rgba(255,255,255,0.02);vertical-align:middle}
    tr.row{transition:transform .18s cubic-bezier(.2,.9,.2,1),opacity .25s ease,height .25s ease}
    tr.row:hover{transform:translateY(-4px)}
    .name{font-weight:600}
    .sub{font-size:12px;color:var(--muted)}
    .actions{display:flex;gap:8px;justify-content:flex-end}
    .delete-btn{
      background:transparent;color:#ff7b89;border:1px solid rgba(255,77,109,0.12);padding:6px 8px;border-radius:8px;cursor:pointer;font-weight:700
    }
    .delete-btn:hover{transform:translateY(-2px)}
    .msg{padding:10px 12px;border-radius:8px;margin-bottom:10px}
    .msg.error{background:rgba(255,77,109,0.06);color:#ffb2bf;border:1px solid rgba(255,77,109,0.06)}
    .msg.success{background:rgba(77,166,255,0.04);color:#cfeaff;border:1px solid rgba(77,166,255,0.04)}
    .empty{padding:28px;text-align:center;color:var(--muted)}
    /* animations */
    .fade-out{opacity:0;height:0;padding:0;margin:0;border:0;overflow:hidden}
    /* modal & form */
    #addStudentModal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:50}
    #addStudentModal[aria-hidden="true"]{display:none}
    .modal-backdrop{position:absolute;inset:0;background:linear-gradient(180deg,rgba(2,6,23,0.6),rgba(2,6,23,0.75));backdrop-filter: blur(4px);opacity:0.98}
    .modal-card{position:relative;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:12px;padding:18px;min-width:280px;max-width:420px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 12px 30px rgba(3,7,20,0.6);z-index:60}
    .modal-card input{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;font-size:14px}
    .modal-card input::placeholder{color:var(--muted)}
    @media (max-width:640px){
      body{padding:18px}
      .logo{width:40px;height:40px}
      thead th, tbody td{padding:10px 6px}
      .modal-card{margin:16px;width:calc(100% - 32px)}
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <div class="logo">SB</div>
        <div>
          <h1>Students</h1>
          <div class="sub">Live list from Supabase — Modern Red & Blue theme</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn" id="refreshBtn">Refresh</button>
        <button class="btn" id="addStudentBtn">Add student</button>
        <button class="btn secondary" id="addDummyBtn">Add dummy</button>
      </div>
    </header>

    <main>
      <div id="messages"></div>

      <!-- Add Student Modal -->
      <div id="addStudentModal" aria-hidden="true" style="display:none">
        <div class="modal-backdrop" aria-hidden="true"></div>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="addStudentTitle">
          <h3 id="addStudentTitle" style="margin:0 0 8px 0">Add Student</h3>
          <form id="addStudentForm">
            <div style="display:grid;gap:8px">
              <input id="studentName" type="text" placeholder="Name" required />
              <input id="studentClass" type="text" placeholder="Class" required />
              <input id="studentAge" type="number" placeholder="Age" required min="1" />
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
              <button type="button" class="btn secondary" id="cancelAddBtn">Cancel</button>
              <button type="submit" class="btn" id="submitAddBtn">Add</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table aria-live="polite">
            <thead>
              <tr>
                <th style="width:40%">Name</th>
                <th style="width:20%">Class</th>
                <th style="width:10%">Age</th>
                <th style="width:20%">Actions</th>
              </tr>
            </thead>
            <tbody id="studentsBody">
              <tr class="row"><td class="empty" colspan="4">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <footer style="margin-top:14px;color:var(--muted);font-size:13px">
      <div>Notes: deletions are permanent. Keep your anon key safe; never expose a service_role key in the browser.</div>
    </footer>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Supabase configuration (you provided these)
    const SUPABASE_URL = 'https://ohhtvqwsszrmmutothiq.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oaHR2cXdzc3pybW11dG90aGlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgyODYwMzEsImV4cCI6MjA4Mzg2MjAzMX0.mYw4Bf5mdamqysKEd6KLn4ss6Ef2wcoKpEcfmOGD_as'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const studentsBody = document.getElementById('studentsBody')
    const messages = document.getElementById('messages')
    const refreshBtn = document.getElementById('refreshBtn')
    const addDummyBtn = document.getElementById('addDummyBtn')

    function showMessage(text, type='success', timeout=3500){
      messages.innerHTML = `<div class="msg ${type}">${text}</div>`
      if(timeout) setTimeout(()=>{ messages.innerHTML = '' }, timeout)
    }

    async function fetchStudents(){
      studentsBody.innerHTML = `<tr class="row"><td class="empty" colspan="4">Loading…</td></tr>`
      try{
        const {data, error} = await supabase.from('students').select('id,name,class,age').order('id', {ascending:true})
        if(error) throw error
        renderStudents(data)
      }catch(err){
        studentsBody.innerHTML = `<tr class="row"><td class="empty" colspan="4">Failed to load students</td></tr>`
        showMessage(err.message || String(err), 'error', 6000)
        console.error(err)
      }
    }

    function renderStudents(rows){
      if(!rows || rows.length === 0){
        studentsBody.innerHTML = `<tr class="row"><td class="empty" colspan="4">No students found</td></tr>`
        return
      }
      studentsBody.innerHTML = ''
      rows.forEach(student => {
        const tr = document.createElement('tr')
        tr.className = 'row'
        tr.dataset.id = student.id
        tr.innerHTML = `
          <td>
            <div class="name">${escapeHtml(student.name || '')}</div>
            <div class="sub">ID: ${student.id}</div>
          </td>
          <td>${escapeHtml(student.class || '')}</td>
          <td>${escapeHtml(student.age != null ? String(student.age) : '')}</td>
          <td class="actions">
            <button class="delete-btn" data-id="${student.id}">Delete</button>
          </td>
        `
        studentsBody.appendChild(tr)
      })
    }

    function escapeHtml(unsafe){
      return unsafe
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // Delegated click handler for delete
    studentsBody.addEventListener('click', async (ev) => {
      const btn = ev.target.closest('.delete-btn')
      if(!btn) return
      const id = btn.dataset.id
      if(!id) return

      const confirmed = confirm('Delete this student? This action cannot be undone.')
      if(!confirmed) return

      // Optimistic UI: animate removal
      const row = btn.closest('tr')
      try{
        btn.disabled = true
        const { error } = await supabase.from('students').delete().eq('id', id)
        if(error) throw error

        // animate out
        row.style.transition = 'opacity .35s ease, height .35s ease, margin .35s ease, padding .35s ease'
        row.style.opacity = '0'
        row.style.height = row.offsetHeight + 'px'
        // force reflow
        void row.offsetHeight
        row.style.height = '0'
        setTimeout(()=>{ row.remove() }, 380)

        showMessage('Student deleted', 'success', 3000)
        // if table empty, show placeholder
        setTimeout(()=>{ if(!studentsBody.querySelector('tr')) studentsBody.innerHTML = `<tr class="row"><td class="empty" colspan="4">No students found</td></tr>` }, 400)
      }catch(err){
        console.error(err)
        showMessage(err.message || 'Failed to delete', 'error', 5000)
        btn.disabled = false
      }
    })

    // Add a small helper to insert dummy data for testing (client-only action)
    addDummyBtn.addEventListener('click', async ()=>{
      try{
        addDummyBtn.disabled = true
        const { data, error } = await supabase.from('students').insert([{ name:'Student '+Math.floor(Math.random()*1000), class:'A', age:16 }])
        if(error) throw error
        showMessage('Dummy student added', 'success', 2500)
        await fetchStudents()
      }catch(err){
        console.error(err)
        showMessage(err.message || 'Failed to add', 'error')
      }finally{ addDummyBtn.disabled = false }
    })

    // Add Student modal & form handling
    const addStudentBtn = document.getElementById('addStudentBtn')
    const addStudentModal = document.getElementById('addStudentModal')
    const addStudentForm = document.getElementById('addStudentForm')
    const cancelAddBtn = document.getElementById('cancelAddBtn')
    const submitAddBtn = document.getElementById('submitAddBtn')
    const studentNameInput = document.getElementById('studentName')
    const studentClassInput = document.getElementById('studentClass')
    const studentAgeInput = document.getElementById('studentAge')

    function openAddModal(){
      addStudentModal.setAttribute('aria-hidden','false')
      addStudentModal.style.display='flex'
      studentNameInput.focus()
    }
    function closeAddModal(){
      addStudentModal.setAttribute('aria-hidden','true')
      addStudentModal.style.display='none'
      addStudentForm.reset()
    }

    addStudentBtn.addEventListener('click', openAddModal)
    cancelAddBtn.addEventListener('click', closeAddModal)
    addStudentModal.querySelector('.modal-backdrop').addEventListener('click', closeAddModal)
    addStudentModal.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeAddModal() })

    addStudentForm.addEventListener('submit', async (e)=>{
      e.preventDefault()
      const name = studentNameInput.value.trim()
      const cls = studentClassInput.value.trim()
      const age = parseInt(studentAgeInput.value,10)

      if(!name){ showMessage('Please enter name', 'error'); studentNameInput.focus(); return }
      if(!cls){ showMessage('Please enter class', 'error'); studentClassInput.focus(); return }
      if(Number.isNaN(age) || age <= 0){ showMessage('Please enter a valid age', 'error'); studentAgeInput.focus(); return }

      try{
        submitAddBtn.disabled = true
        const { data, error } = await supabase.from('students').insert([{ name, class: cls, age }])
        if(error) throw error
        showMessage('Student added', 'success', 2500)
        closeAddModal()
        await fetchStudents()
      }catch(err){
        console.error(err)
        showMessage(err.message || 'Failed to add', 'error', 5000)
      }finally{ submitAddBtn.disabled = false }
    })

    refreshBtn.addEventListener('click', fetchStudents)

    // Initial load
    fetchStudents()

  </script>
</body>
</html>
