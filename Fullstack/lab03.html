<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        var products = [
            { name: "CPU", price: 250, category: "Processor", description: "High performance CPU", image: "https://placehold.co/600x400/png" },
            { name: "GPU", price: 450, category: "Graphics", description: "Powerful graphics card", image: "https://placehold.co/600x400/png" },
            { name: "RAM", price: 120, category: "Memory", description: "Fast DDR4 RAM", image: "https://placehold.co/600x400/png" },
            { name: "Motherboard", price: 300, category: "Mainboard", description: "ATX Motherboard", image: "https://placehold.co/600x400/png" },
            { name: "Power Supply", price: 180, category: "Power", description: "650W PSU", image: "https://placehold.co/600x400/png" },
            { name: "SSD", price: 220, category: "Storage", description: "NVMe SSD", image: "https://placehold.co/600x400/png" }
        ];

        function renderProducts() {
            var container = document.getElementById("product-list");
            container.innerHTML = "";

            products.forEach(product => {
                container.innerHTML += `
                <div class="col-12 col-md-6 col-xl-2 p-2 product-item">
                    <div class="card h-100 shadow-sm">
                        <img src="${product.image}" class="card-img-top" alt="${product.name}">
                        <div class="card-body text-center">
                            <span class="badge bg-info mb-2">${product.category}</span>
                            <h5 class="card-title">${product.name}</h5>
                            <p class="card-text small text-muted">${product.description}</p>
                            <h6 class="text-success">THB ${product.price}</h6>
                            <button class="btn btn-danger btn-sm mt-2" onclick="addToCart()">Add to cart</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function searchProduct() {
            var keyword = document.getElementById("searchInput").value.toUpperCase();
            var category = document.getElementById("categoryFilter").value;
            var items = document.getElementsByClassName("product-item");

            var found = false;

            for (var i = 0; i < items.length; i++) {
                var title = items[i].querySelector(".card-title").innerText.toUpperCase();
                var badge = items[i].querySelector(".badge").innerText;

                var matchName = title.includes(keyword);
                var matchCategory = category === "" || badge === category;

                if (matchName && matchCategory) {
                    items[i].style.display = "";
                    found = true;
                } else {
                    items[i].style.display = "none";
                }
            }

            if (!found && keyword !== "") {
                new bootstrap.Toast(document.getElementById("toast")).show();
            }
        }

        function addToCart() {
            new bootstrap.Modal(document.getElementById("cartModal")).show();
        }

        document.addEventListener("DOMContentLoaded", function () {
            renderProducts();

            document.getElementById("searchInput").addEventListener("input", searchProduct);
            document.getElementById("categoryFilter").addEventListener("change", searchProduct);
        });
    </script>
</head>

<body>
<div class="container my-4">
    <h1 class="mb-4">🛒 Tech Shop</h1>
    <input type="search" id="searchInput" class="form-control mb-3" placeholder="Search product...">

    <select id="categoryFilter" class="form-select mb-4">
        <option value="">-- All Categories --</option>
        <option value="Processor">Processor</option>
        <option value="Graphics">Graphics</option>
        <option value="Memory">Memory</option>
        <option value="Mainboard">Mainboard</option>
        <option value="Power">Power</option>
        <option value="Storage">Storage</option>
    </select>

    <!-- Product List -->
    <div class="row" id="product-list"></div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div class="toast" id="toast">
        <div class="toast-header">
            <strong class="me-auto text-danger">Alert</strong>
            <button class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body">
            Product not found!
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Add this product to cart?
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-danger">Yes</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
