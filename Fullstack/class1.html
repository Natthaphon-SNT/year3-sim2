<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 01</title>
    <link rel="stylesheet" href="class01.css">
    
  </head>
  <body>
    <h1>Hello World from Fullstack class!!!</h1>
    <div>
      <form method="post" action="/submit">
        <table>
          <tr>
            <td>
              <label for="name">Enter your name: </label>
            </td>
            <td>
              <input type="text" id="name" name="name" required />
            </td>
          </tr>

          <tr>
            <td><label for="age">Enter your age: </label></td>
            <td><input type="number" id="age" name="age" required /></td>
          </tr>

          <tr>
            <td><label for="gender">Enter your gender: </label></td>
            <td>
              <input type="radio" id="gender" name="gender" value="M" /> Male
              &nbsp;
              <input type="radio" id="gender" name="gender" value="F" /> Female
              &nbsp;
              <input type="radio" id="gender" name="gender" value="O" /> Others
            </td>
            
          </tr>

          <tr>
            <td><label for="address">Select your address: </label></td>
            <td>
              <select name="country" id="country">
                <option value="India">India</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
                <option value="Canada">Canada</option>
                <option value="Australia">Australia</option>
              </select>
            </td>
          </tr>

          <tr>
            <td><label for="address">Enter your address: </label></td>
            <td>
              <textarea name="address" id="address" rows="4" cols="50">
              </textarea>
            </td>
          </tr>

          <tr>
            <td><label for="martialstatus">Are you married?: </label></td>
            <td>
              <input
                type="checkbox"
                id="martialstatus"
                name="martialstatus"
                value="Married"
              />
              Married
            </td>
          </tr>
          <tr>
            <td><input type="submit" value="Submit" /></td>
          </tr>
        </table>
        
      </form>
      <br />
    </div>
    <div
    class="outer-div"
      style="
        width: 200px;   
        height: 200px;
        background-color: lightblue;
        padding: 20px;
      "
    >
      This is outer div
      <div style="width: 50px; height: 50px; background-color: lightcoral">
        This is inner div
      </div>
    </div>
  </body>
</html>
