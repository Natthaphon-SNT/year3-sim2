<div class="container">
    <h2>จัดการการยืม-คืนหนังสือ</h2>

    <div *ngIf="isLoading" class="loading">
        กำลังโหลดข้อมูล...
    </div>

    <table *ngIf="!isLoading" class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Student ID</th>
                <th>Book ID</th>
                <th>Borrow Date</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Fine</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let record of records">
                <td>{{ record.record_id }}</td>
                <td>{{ record.student_id }}</td>
                <td>{{ record.book_id }}</td>
                <td>{{ record.borrow_date }}</td>
                <td>{{ record.due_date }}</td>
                <td>
                    <span *ngIf="record.status === 'borrowed'" class="status borrowed">ยืม</span>
                    <span *ngIf="record.status === 'returned'" class="status returned">คืนแล้ว</span>
                    <span *ngIf="record.status === 'overdue'" class="status overdue">เกินกำหนด</span>
                </td>
                <td>{{ record.fine_amount }}</td>
                <td>
                    <button *ngIf="record.status === 'borrowed'" (click)="processReturn(record.record_id)"
                        class="btn-process">รับคืน</button>
                    <button *ngIf="record.status === 'overdue' && record.fine_amount > 0"
                        (click)="payFine(record.record_id)" class="btn-pay">ชำระค่าปรับ</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
