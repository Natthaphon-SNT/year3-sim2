<div class="login-container">
  <div class="login-box">
    <h2 style="color: #00529b; text-align: center; margin-bottom: 20px;">ระบบบริการการศึกษา</h2>
    
    <div *ngIf="errorMessage" class="error-alert">{{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>รหัสนักศึกษา / Username</label>
        <input type="text" [(ngModel)]="username" name="username" class="form-control" placeholder="กรอกชื่อผู้ใช้งาน">
      </div>
      
      <div class="form-group">
        <label>รหัสผ่าน / Password</label>
        <input type="password" [(ngModel)]="password_secure" name="password_secure" class="form-control" placeholder="กรอกรหัสผ่าน">
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        {{ isLoading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ' }}
      </button>
    </form>
  </div>
</div>
