<div class="page-container">
  <h3 class="page-title">ผลการศึกษา</h3>

  <div *ngIf="isLoading" class="loading-text">กำลังโหลดข้อมูล...</div>
  <div *ngIf="errorMessage" class="error-text">{{ errorMessage }}</div>

  <table class="data-table" *ngIf="!isLoading && !errorMessage">
    <thead>
      <tr>
        <th width="15%">ปีการศึกษา</th>
        <th width="15%">เทอม</th>
        <th width="20%">รหัสวิชา</th>
        <th width="30%">ชื่อวิชา</th>
        <th width="10%" class="text-center">เกรด</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="grades.length === 0">
        <td colspan="5" class="text-center">ไม่มีข้อมูลผลการศึกษา</td>
      </tr>
      
      <tr *ngFor="let g of grades; let i = index" [class.row-even]="i % 2 === 0">
        <td class="text-center">{{ g.academic_year }}</td>
        <td class="text-center">{{ g.semester }}</td>
        <td class="text-center font-bold">{{ g.course_code }}</td>
        <td>{{ g.title }}</td>
        <td class="text-center font-bold" 
            [ngClass]="{'grade-a': g.grade === 'A', 'grade-f': g.grade === 'F'}">
          {{ g.grade }}
        </td>
      </tr>
    </tbody>
  </table>
</div>
