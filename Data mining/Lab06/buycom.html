<!DOCTYPE html>
<html>
<head>
    <title>ระบบทำนายการซื้อคอมพิวเตอร์ (JS Version)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: left;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
        }

        label {
            font-weight: bold;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        input[type="number"], 
        input[type="text"], 
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
        }

        button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        /* ซ่อนกล่องผลลัพธ์ไว้ก่อน */
        #resultBox {
            display: none; 
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f5e9;
            border-left: 5px solid #4CAF50;
            border-radius: 4px;
            text-align: center;
        }

        .result-text {
            color: #2e7d32;
            font-size: 18px;
            font-weight: bold;
            margin: 0;
        }
        
        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ระบบทำนายการซื้อคอมฯ (JS)</h2>
        
        <form onsubmit="predictResult(event)">
            
            <label>Age (อายุ):</label>
            <input type="number" id="age" required placeholder="ระบุอายุเป็นตัวเลข">
            
            <label>Student (เป็นนักเรียน?):</label>
            <select id="student">
                <option value="yes">Yes (ใช่)</option>
                <option value="no">No (ไม่ใช่)</option>
            </select>
            
            <label>Credit Rating (เครดิต):</label>
            <select id="credit">
                <option value="fair">Fair (ปานกลาง)</option>
                <option value="excellent">Excellent (ดีเยี่ยม)</option>
            </select>
            
            <button type="submit">ทำนายผล</button>
        </form>

        <div id="resultBox">
            <hr>
            <p class="result-text">ผลการทำนาย: <br><span id="outputResult"></span></p>
        </div>
    </div>

    <script>
        function predictResult(event) {
            event.preventDefault();

            let age = parseInt(document.getElementById('age').value);
            let student = document.getElementById('student').value;
            let credit = document.getElementById('credit').value;
            let result = "";

            if (age <= 30) {
                if (student == "no") {
                    result = "❌ ไม่ซื้อ (No)";
                } else if (student == "yes") {
                    result = "✅ ซื้อ (Yes)";
                }
            } 
            else if (age > 30 && age <= 40) {
                result = "✅ ซื้อ (Yes)";
            } 
            else if (age > 40) {
                if (credit == "fair") {
                    result = "✅ ซื้อ (Yes)";
                } else if (credit == "excellent") {
                    result = "❌ ไม่ซื้อ (No)";
                }
            }

            let resultBox = document.getElementById('resultBox');
            let outputSpan = document.getElementById('outputResult');

            outputSpan.innerText = result;
            resultBox.style.display = "block";
        }
    </script>

</body>
</html>
