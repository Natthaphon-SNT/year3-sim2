version: "3"
 
services:

  web:

    build: .

    ports:

      - "8080:80"

    volumes:

      - ./php:/var/www/html

    depends_on:

      - db
 
  db:

    image: mysql:8.0

    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: labdb

      MYSQL_USER: labuser

      MYSQL_PASSWORD: labpass

 